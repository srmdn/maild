<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In — maild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { background: #0a0a0a; color: #fafafa; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 48px; width: 100%; max-width: 420px; }
    .auth-brand { font-size: 28px; font-weight: 900; margin: 0 0 8px; }
    .auth-brand a { color: #fafafa; text-decoration: none; }
    .auth-title { font-size: 20px; font-weight: 700; margin: 0 0 8px; }
    .auth-sub { color: #888; font-size: 14px; margin: 0 0 32px; }
    .auth-form { display: flex; flex-direction: column; gap: 20px; }
    .auth-label { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .auth-input { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 14px 16px; color: #fafafa; font-size: 15px; width: 100%; box-sizing: border-box; font-family: inherit; }
    .auth-input:focus { outline: none; border-color: #ff4d00; }
    .auth-input::placeholder { color: #555; }
    .auth-error { background: #2a1010; border: 1px solid #ff4d00; border-radius: 8px; padding: 12px 16px; color: #ff6b2b; font-size: 14px; }
    .auth-button { background: #ff4d00; color: #fff; border: none; border-radius: 8px; padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: background 0.2s; font-family: inherit; }
    .auth-button:hover { background: #ff6b2b; }
    .auth-footer { text-align: center; color: #888; font-size: 14px; margin-top: 24px; }
    .auth-footer a { color: #fafafa; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <p class="auth-brand"><a href="/">maild</a></p>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to your account to continue.</p>
    <div id="error" class="auth-error" hidden></div>
    <form class="auth-form" id="loginForm">
      <div>
        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div>
        <label class="auth-label" for="password">Password</label>
        <input class="auth-input" type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="auth-button">Log In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="/signup">Sign up</a></p>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        const data = await res.json();
        errorEl.textContent = data.error || 'Login failed';
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
