name: Task
description: Track a concrete implementation task with acceptance criteria.
title: "task: "
labels:
  - enhancement
body:
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: What user or operator outcome should this task deliver?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which areas are in scope and explicitly out of scope?
      placeholder: |
        In scope:
        Out of scope:
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List clear criteria that define done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: Which tests, checks, or manual validations are required?
      placeholder: |
        - `go test ./...`
        - manual API/UI checks
    validations:
      required: true
