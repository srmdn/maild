name: Feature Request
description: Propose a new capability or improvement for maild.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user or operator problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What behavior, API, or workflow should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternatives or workarounds you've considered.
  - type: textarea
    id: risk
    attributes:
      label: Risk and Tradeoffs
      description: Potential side effects, migration cost, or operational risks.
